<!DOCTYPE html>
<html>
    <head>
        <title>To Do List</title>
        <style>
            body{
                width: 100%;
                height: 100%;
                background-color: aquamarine;
                font-family: fantasy;
            }

            #showBox{
                position: absolute;
                width: 30%;
                height: 50%;
                top: 25%;
                left: 37%;
                overflow: auto;
                border-bottom: 0px;
                border-left: 1px;
                border-left-color: black;
                border-left-style: solid;
                border-right: 1px;
                border-right-color: black;
                border-right-style: solid;
                border-top: 1px;
                border-top-color: black;
                border-top-style: solid;
                background-color: rgb(147, 245, 211);
                font-family: fantasy;
                
            }

            h1{
                text-align: center;
                margin-top: 4%;
                
            }

            input{
                margin-top:5%;
                margin-left: 12%;
                width: 60%;
                font-family: fantasy;
            }

         

            .removeButton{
                position:absolute;
                background-color: rgb(16, 205, 238);
                border-radius: 5px;
                left: 75%;
                font-family: fantasy;
            }
            
            #clear{
                position:absolute;
                width: 30.2%;
                height: 10%;
                background-color: red;
                color: white;
                top:75.1%;
                left: 37%;
                border-top: 0px;
                border-left: 1px;
                border-left-color: black;
                border-left-style: solid;
                border-right: 1px;
                border-right-color: black;
                border-right-style: solid;
                border-bottom: 1px;
                border-bottom-color: black;
                border-bottom-style: solid;
                font-size: 25px;
                font-family: fantasy;
            }

            #add{
                font-family: fantasy;
            }
        </style>
    </head>
    <body>
        <h1>To Do List</h1>
        <div id="showBox">
            <input placeholder="What to do?">
            <button id="add">Add</button>
            <ol>
                <div id="thingToDo"></div>
            </ol>
            
        </div>
        <button id="clear">Clear</button>



        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script>
            $(document).ready(function(){
                $("#add").click(function(){
                    var x = $("input").val()
                    if (x==""){
                        alert("Please type something :)")
                    }else{
                        var y = $("<li></li>").text(x)
                        y.append("<button>Delete</button>")
                        y.children().addClass("removeButton")
                        $("#thingToDo").append(y)
                        $("input").val("")
                        $(".removeButton").click(function(){
                            $(this).parent().remove()
                        })
                        
                    }
                })
                
                $("#clear").click(function(){
                    $("#thingToDo").empty()
                    
                })
               
                
              
            })
        </script>
    </body>
</html>
