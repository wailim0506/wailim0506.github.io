<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>Manchester City - Fixtures</title>
        <style>

            div{
                display: flex;
                height: 75px;
                border: 1px solid black;
                width: 100px;
            }
            ul{
                position: relative;
                top: 12px;
                list-style: none;
                width: 100%;
                background-color: aqua;
            }

            .hidden{
                display: none;
            }

            ul:hover .hidden{
                display: block;
            }

        
        </style>
    </head>
    <body>
        <div>
            <ul>
                <li>Hi</li> 
                <li class="hidden">h</li>
                <li class="hidden">abcdsfdssssssss</li>
            </ul>
        </div>
    </body>
</html>
