<!DOCTYPE html>
<html>
    <head>
        <title>Timer</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Bootstrap 5 CDN-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Stylesheet-->
        <link rel="stylesheet" href="style.css">
      </head>
      <body class="bg-warning">
            <div class="card mx-auto">
                <div class="card-body">

                    <!-- Time Area -->
                    <div class="mx-auto bg-light p-3" style="width: 260px;">
                        <h2 style="text-align: center;">
                            <p id="hr"></p>
                            <p>:</p>
                            <p id="min"></p>
                            <p>:</p>
                            <p id="sec"></p>
                        </h2>
                    </div>

                    <!-- Button Area-->
                    <div class="mt-4">
                        <div class="row">
                            <div class="col-sm-4">
                                <button class="btn btn-success d-block mx-auto" id="start">Start</button>
                            </div>
                            <div class="col-sm-4">
                                <button class="btn btn-danger d-block mx-auto" id="stop">Stop</button>
                            </div>
                            <div class="col-sm-4">
                                <button class="btn btn-primary d-block mx-auto" id="reset">Reset</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
            <script src="script.js"></script>
      </body>
</html>
